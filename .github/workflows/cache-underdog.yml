name: Cache Underdog Fantasy Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout cache branch
        uses: actions/checkout@v4
        with:
          ref: cache
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure cache directory exists
        run: mkdir -p data/underdog-cache

      - name: Fetch all sports
        run: |
          UA="Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148"
          BASE="https://api.underdogfantasy.com/beta/v5/over_under_lines"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          for SPORT in NBA NHL MLB NFL; do
            FILE="data/underdog-cache/underdog_${SPORT}.json"
            HTTP=$(curl -s -o "$FILE" -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "User-Agent: $UA" \
              -H "Accept-Language: en-US,en;q=0.9" \
              --compressed --max-time 30 \
              "${BASE}?sport_id=${SPORT}")
            echo "$SPORT HTTP: $HTTP"
            if [ "$HTTP" = "200" ]; then
              jq --arg ts "$NOW" --arg sp "$SPORT" \
                '. + {cached_at: $ts, sport: $sp}' \
                "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"
              COUNT=$(jq '.over_under_lines | length' "$FILE")
              echo "$SPORT: $COUNT lines cached"
            else
              echo "{\"over_under_lines\":[],\"appearances\":[],\"players\":[],\"games\":[],\"solo_games\":[],\"cached_at\":\"$NOW\",\"sport\":\"$SPORT\",\"error\":\"HTTP $HTTP\"}" > "$FILE"
            fi
          done

      - name: Commit and push cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/underdog-cache/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Underdog cache $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin cache
          fi
